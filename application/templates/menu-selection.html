<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>کافه | انتخاب منو</title>
  <link rel="stylesheet" href="{{url_for('static',filename='cafe_flow.css')}}" /></head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="title">کافه شما</div>
        <div class="subtitle">قدم ۱: محصول‌ها را انتخاب کنید، سپس به صفحهٔ تأیید بروید.</div>
      </div>

      <div class="stepper" aria-label="steps">
        <div class="step active"><div class="dot"></div><span>menu-selection</span></div>
        <div class="step"><div class="dot"></div><span>confirm</span></div>
        <div class="step"><div class="dot"></div><span>done</span></div>
      </div>
    </div>

    <div class="card">
      <form class="section" action="/confirm" method="get">
        <div class="grid">

          <!-- Item -->
          <div class="menu-item">
            <div class="thumb" aria-hidden="true"></div>
            <div class="item-body">
              <div class="item-title">
                <h3>{{product._name}}</h3>
                <div class="price">{{product._price}}</div>
              </div>
              <p class="desc">{{product._description}}</p>
              <div class="select-row">
                <label class="checkbox">
                  <input type="checkbox" name="items" value="کاپوچینو|95000">
                  انتخاب
                </label>
                <span class="badge">Hot</span>
              </div>
            </div>
          </div>

        </div>

        <div class="actions">
          <div class="hint">
            با زدن دکمهٔ «ادامه»، موارد انتخاب‌شده به صفحهٔ confirm منتقل می‌شوند.
          </div>
          <button class="btn btn-primary" type="submit">ادامه → confirm</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
